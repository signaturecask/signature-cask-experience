
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Cask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: serif; text-align: center; padding: 50px 20px; }
        .gold-border { border: 1px solid #D4AF37; padding: 40px 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="max-w-sm mx-auto">
        <h1 class="text-4xl italic mb-2">Signature Cask</h1>
        <p class="text-white tracking-[0.3em] uppercase text-[10px] mb-12">The Experience</p>
        
        <div class="gold-border">
            <h2 class="text-2xl italic text-white mb-8">Reuniting<br>Spirit & Wood</h2>
            <input type="number" id="idInput" placeholder="Enter Bottle ID" class="bg-transparent border-b border-[#D4AF37] text-white text-center w-full mb-10 pb-2 outline-none text-xl italic">
            <button onclick="checkCloud()" id="vbtn" class="w-full py-4 border border-[#D4AF37] text-[#D4AF37] tracking-widest text-xs uppercase font-bold hover:bg-[#D4AF37] hover:text-black transition-all">Verify Provenance</button>
        </div>
    </div>

    <script>
        async function checkCloud() {
            const id = document.getElementById('idInput').value;
            const btn = document.getElementById('vbtn');
            
            if(!id) return alert("Please enter a Bottle ID.");
            
            btn.innerHTML = "CONSULTING LEDGER...";
            btn.style.opacity = "0.5";

            try {
                // This fetches the data from your api/edge.js "Bridge"
                const res = await fetch('/api/edge?key=bottle_' + id);
                const data = await res.json();

                if (data && data.value) {
                    alert("✓ VERIFIED AUTHENTIC\n\nOwner: " + data.value + "\nStatus: Secured in Ledger");
                } else {
                    alert("Bottle ID not found in current ledger.");
                }
            } catch (e) {
                alert("Connection Error. Please check your signal.");
            }

            btn.innerHTML = "Verify Provenance";
            btn.style.opacity = "1";
        }
    </script>
</body>
</html>
