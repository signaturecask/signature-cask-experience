<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature Cask | Zenith</title>
    <style>
        :root { --gold: #c5a059; --dark: #050505; }
        body { background: var(--dark); color: var(--gold); font-family: 'Georgia', serif; text-align: center; margin: 0; }
        #calibration { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero { height: 40vh; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--gold); }
        .logo { width: 120px; filter: drop-shadow(0 0 15px rgba(197,160,89,0.5)); }
        .container { padding: 30px 20px; max-width: 500px; margin: 0 auto; }
        .box { border: 1px solid var(--gold); padding: 25px; background: rgba(255,255,255,0.02); margin-bottom: 25px; }
        button { background: var(--gold); color: black; border: none; padding: 18px 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; width: 100%; cursor: pointer; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 15px; }
        input { background: transparent; border: none; border-bottom: 2px solid #333; color: white; font-size: 2.5rem; width: 120px; text-align: center; outline: none; margin-bottom: 20px; }
        #debug { font-size: 0.5rem; opacity: 0.5; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="calibration">
        <img src="logo.png" style="width:100px; margin-bottom:20px;">
        <h2 style="letter-spacing:5px; font-size:1rem;">SIGNATURE CASK</h2>
        <p style="font-size:0.6rem; letter-spacing:2px; margin-bottom: 30px;">CALIBRATING ATLANTIC ATMOSPHERE</p>
        <button onclick="ignite()" style="width:auto; padding:15px 40px;">ENTER EXPERIENCE</button>
    </div>

    <audio id="sndWaves" loop playsinline crossorigin="anonymous">
        <source src="https://actions.google.com/sounds/v1/water/waves_crashing_on_shore.ogg" type="audio/ogg">
    </audio>
    <audio id="sndFire" loop playsinline crossorigin="anonymous">
        <source src="https://actions.google.com/sounds/v1/ambient/cracking_fire.ogg" type="audio/ogg">
    </audio>

    <div class="hero">
        <div>
            <img src="logo.png" class="logo">
            <h1 style="letter-spacing:10px; font-size:1.1rem; margin-top:10px;">SIGNATURE CASK</h1>
        </div>
    </div>

    <div class="container">
        <div class="box">
            <h2 style="font-size:0.8rem; letter-spacing:4px;">PROVENANCE</h2>
            <p style="font-size:0.75rem; color:#bbb; font-style:italic;">Distilled 15/12/09. Drawn 21/01/26. Cask 812264B. 55.9% Vol.</p>
        </div>

        <div class="box">
            <span style="font-size:0.6rem; letter-spacing:3px; opacity:0.6;">AUTHENTICATE BOTTLE</span><br>
            <input type="number" id="num" placeholder="0" inputmode="numeric">
            <button onclick="check()">Verify Ownership</button>
            <div id="display"></div>
        </div>
        
        <div id="debug">System Status: Ready</div>
    </div>

    <script>
        const w = document.getElementById('sndWaves');
        const f = document.getElementById('sndFire');

        function ignite() {
            document.getElementById('calibration').style.display = 'none';
            document.getElementById('debug').innerText = "System Status: Playing Atlantic Waves & Peat Fire";
            
            w.volume = 0.5;
            f.volume = 0.3;
            
            // Force play with error tracking
            w.play().catch(e => document.getElementById('debug').innerText = "Waves Blocked: " + e);
            f.play().catch(e => document.getElementById('debug').innerText = "Fire Blocked: " + e);
        }

        function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            if(!n) return;
            d.innerHTML = "<p style='font-size:0.7rem;'>CONSULTING LEDGER...</p>";
            
            fetch(`/api/edge?key=${n}`).then(res => res.json()).then(data => {
                if (data.result) {
                    d.innerHTML = `<h2 style="color:white; font-style:italic; margin-top:20px;">${data.result.toUpperCase()}</h2>`;
                }
            });
        }
    </script>
</body>
</html>
