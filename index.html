<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature Cask | The Experience</title>
    
    <style>
        :root { --gold: #c5a059; --dark: #050505; --glow-color: rgba(197, 160, 89, 0.5); }
        body { background-color: var(--dark); color: var(--gold); font-family: 'Georgia', serif; margin: 0; padding: 0; text-align: center; line-height: 1.6; }
        
        .hero { position: relative; height: 45vh; overflow: hidden; border-bottom: 1px solid var(--gold); }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.3); }
        .hero-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .logo { width: 140px; filter: drop-shadow(0 0 15px var(--glow-color)) drop-shadow(0 0 30px var(--glow-color)); animation: softPulse 4s infinite alternate; }

        .container { padding: 30px 20px; max-width: 500px; margin: 0 auto; }
        .box { border: 1px solid var(--gold); padding: 25px; background: rgba(255,255,255,0.02); margin-bottom: 25px; }
        
        input { background: transparent; border: none; border-bottom: 2px solid #333; color: white; font-size: 1.5rem; width: 80%; text-align: center; margin-bottom: 20px; outline: none; }
        .num-input { font-size: 2.5rem; width: 120px; }
        
        button { background: var(--gold); color: black; border: none; padding: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; width: 100%; font-size: 0.8rem; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 15px; }

        .registration-form { display: none; margin-top: 20px; animation: fadeIn 1s; }
        
        @keyframes softPulse { from { filter: drop-shadow(0 0 10px var(--glow-color)); } to { filter: drop-shadow(0 0 25px var(--glow-color)); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { padding: 40px; opacity: 0.3; font-size: 0.6rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="hero">
        <video class="hero-video" autoplay muted loop playsinline preload="auto">
            <source src="https://signature-cask-experience-blob-lhr1.public.blob.vercel-storage.com/1774511307741.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" class="logo" alt="Signature Cask">
            <h1 style="letter-spacing:10px; font-size:1.2rem; font-weight:300; margin:5px 0 0 0;">SIGNATURE CASK</h1>
            <p style="font-size:0.8rem; letter-spacing:3px; font-style:italic; margin-top: 5px;">The Inchgower 16 Legacy</p>
        </div>
    </div>

    <div class="container">
        <div class="box">
            <div id="verify-ui">
                <span style="font-size:0.6rem; letter-spacing:3px; opacity:0.6;">VERIFY BOTTLE NUMBER</span><br>
                <input type="number" id="num" class="num-input" placeholder="0" inputmode="numeric">
                <button onclick="check()">Consult Ledger</button>
            </div>

            <div id="display"></div>

            <div id="reg-form" class="registration-form">
                <h3 style="font-size:0.8rem; letter-spacing:3px;">BOTTLE UNREGISTERED</h3>
                <p style="font-size:0.7rem; color:#aaa; font-style:italic;">Register your ownership in the Signature Cask Global Ledger.</p>
                <input type="text" id="reg-name" placeholder="FULL NAME">
                <input type="email" id="reg-email" placeholder="EMAIL ADDRESS">
                <button onclick="submitRegistration()">Request Registration</button>
            </div>
        </div>

        <div class="box">
            <h3 style="letter-spacing:4px; font-size:0.8rem;">THE RITUAL OF SMOKE</h3>
            <div id="timer-num" style="font-size:4rem; color:white;">30</div>
            <button id="timer-btn" class="btn-outline" onclick="startRitual()">Start Ritual</button>
        </div>
    </div>

    <script>
        async function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            const r = document.getElementById('reg-form');
            if(!n) return;
            
            d.innerHTML = "<p style='font-size:0.7rem;'>CONSULTING SECURE LEDGER...</p>";
            r.style.display = "none";

            try {
                const res = await fetch(`/api/edge?key=${n}`);
                const data = await res.json();
                
                if (data.result && data.result !== "Unregistered") {
                    const owner = data.result.toUpperCase();
                    d.innerHTML = `
                        <div style="border-top:1px solid #333; margin-top:20px; padding-top:20px;">
                            <span style="font-size:0.6rem; letter-spacing:3px;">OFFICIAL OWNER</span>
                            <h2 style="color:white; font-style:italic; font-size:2rem; margin:10px 0;">${owner}</h2>
                            <p style="font-size:0.7rem;">BOTTLE ${n} OF 89 | 55.9% VOL</p>
                        </div>`;
                } else {
                    d.innerHTML = "";
                    r.style.display = "block"; // Show the registration form
                }
            } catch { d.innerHTML = "<p>ERROR CONNECTING</p>"; }
        }

        function submitRegistration() {
            const name = document.getElementById('reg-name').value;
            const bottle = document.getElementById('num').value;
            if(!name) return alert("Please enter your name.");

            // This is a placeholder for sending the data to you
            // You can use a service like Formspree.io to get these via email
            alert(`Registration request sent for ${name} (Bottle #${bottle}). We will update the ledger shortly.`);
            
            // Logic to clear the form
            document.getElementById('reg-form').innerHTML = "<h3>REQUEST RECEIVED</h3><p>Your details are being added to the heritage ledger.</p>";
        }

        function startRitual() {
            let t = 30;
            const b = document.getElementById('timer-btn');
            b.disabled = true;
            const c = setInterval(() => {
                t--;
                document.getElementById('timer-num').innerText = t;
                if(t <= 0) { clearInterval(c); document.getElementById('timer-num').innerText = "POUR"; b.disabled = false; }
            }, 1000);
        }
    </script>
</body>
</html>
