<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature Cask | The Master Collection</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#c5a059">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root { --gold: #c5a059; --dark: #050505; }
        body { background-color: var(--dark); color: var(--gold); font-family: 'Georgia', serif; margin: 0; padding: 0; text-align: center; line-height: 1.6; }
        
        /* Video Hero */
        .hero { position: relative; height: 45vh; overflow: hidden; border-bottom: 1px solid var(--gold); }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.35); }
        .hero-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { width: 110px; margin-bottom: 10px; }

        .container { padding: 30px 20px; max-width: 500px; margin: 0 auto; }
        .box { border: 1px solid var(--gold); padding: 25px; background: rgba(255,255,255,0.02); margin-bottom: 25px; }
        
        /* Heritage Grid */
        .tasting-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .note { border: 1px solid #333; padding: 12px 5px; font-size: 0.65rem; text-transform: uppercase; color: #eee; }
        .note b { display: block; color: var(--gold); margin-bottom: 4px; font-size: 0.6rem; letter-spacing: 1px; }

        input { background: transparent; border: none; border-bottom: 2px solid #333; color: white; font-size: 2.2rem; width: 100px; text-align: center; margin-bottom: 20px; outline: none; }
        button { background: var(--gold); color: black; border: none; padding: 16px; font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; width: 100%; font-size: 0.75rem; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 15px; }

        /* Tasting Modal */
        #tastingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 400px; border: 1px solid var(--gold); background: var(--dark); padding: 20px; position: relative; }
        
        #timer-num { font-size: 4rem; color: white; font-weight: 300; margin: 5px 0; }
        .bottle-card { border: 2px solid var(--gold); padding: 25px; margin-top: 20px; background: rgba(255,255,255,0.05); }

        footer { padding: 40px; opacity: 0.3; font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="hero">
        <video class="hero-video" autoplay muted loop playsinline preload="auto">
            <source src="https://signature-cask-experience-blob-lhr1.public.blob.vercel-storage.com/1774511307741.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" class="logo">
            <h1 style="letter-spacing:10px; font-size:1rem; font-weight:300;">SIGNATURE CASK</h1>
            <p style="font-size:0.65rem; letter-spacing:4px; font-style:italic; opacity:0.8;">The Inchgower 16 Legacy</p>
        </div>
    </div>

    <div class="container">
        <h2 style="font-size:0.8rem; letter-spacing:4px; margin-bottom:15px;">CASK HERITAGE</h2>
        <div class="tasting-grid">
            <div class="note"><b>Cask Type</b>1st Fill Bourbon</div>
            <div class="note"><b>Distilled</b>June 2007</div>
            <div class="note"><b>Region</b>Speyside Coast</div>
        </div>
        <div class="tasting-grid">
            <div class="note"><b>Palate</b>Maritime Salinity</div>
            <div class="note"><b>Nose</b>Vanilla Pod</div>
            <div class="note"><b>Finish</b>Toasted Oak</div>
        </div>
        <button class="btn-outline" onclick="openTasting()">Watch Guided Tasting</button>

        <div class="box" style="margin-top:30px;">
            <span style="font-size:0.55rem; letter-spacing:3px; opacity:0.6;">ENTER BOTTLE NUMBER</span><br>
            <input type="number" id="num" placeholder="0" inputmode="numeric">
            <button onclick="check()">Verify Ownership</button>
            <div id="display"></div>
        </div>

        <div class="box">
            <h3 style="letter-spacing:3px; font-size:0.8rem;">THE SMOKING RITUAL</h3>
            <div id="timer-num">30</div>
            <button id="timer-btn" class="btn-outline" onclick="startRitual()">Start Ritual Timer</button>
        </div>
    </div>

    <div id="tastingModal">
        <div class="modal-content">
            <h3 style="font-size:0.8rem; letter-spacing:3px; margin-bottom:20px;">THE SOMMELIER'S NOTES</h3>
            <video id="tastingVideo" width="100%" controls style="border: 1px solid var(--gold);">
                <source src="PASTE_YOUR_TASTING_VIDEO_URL_HERE.mp4" type="video/mp4">
            </video>
            <button onclick="closeTasting()" class="btn-outline" style="margin-top:20px;">Close Experience</button>
        </div>
    </div>

    <canvas id="shareCanvas" style="display:none;"></canvas>
    <footer>© 2024 SIGNATURE CASK GLOBAL REGISTRY</footer>

    <script>
        function openTasting() { document.getElementById('tastingModal').style.display = 'flex'; }
        function closeTasting() { 
            const v = document.getElementById('tastingVideo');
            v.pause();
            document.getElementById('tastingModal').style.display = 'none'; 
        }

        async function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            if(!n) return;
            d.innerHTML = "<p style='font-size:0.7rem; letter-spacing:2px;'>VERIFYING...</p>";
            try {
                const res = await fetch(`/api/edge?key=${n}`);
                const data = await res.json();
                if (data.result) {
                    const owner = data.result.toUpperCase();
                    d.innerHTML = `
                        <div class="bottle-card">
                            <span style="font-size:0.6rem; letter-spacing:3px;">AUTHENTICATED OWNER</span>
                            <h2 style="color:white; font-style:italic; margin:10px 0;">${owner}</h2>
                            <p style="font-size:0.7rem;">BOTTLE ${n} OF 89 | CASK 812264B</p>
                            <button class="btn-outline" onclick="shareCert('${owner}', '${n}')" style="font-size:0.6rem;">Share Certificate</button>
                        </div>`;
                } else { d.innerHTML = "<p>NOT FOUND</p>"; }
            } catch { d.innerHTML = "<p>ERROR</p>"; }
        }

        function startRitual() {
            let t = 30;
            const btn = document.getElementById('timer-btn');
            btn.disabled = true;
            const i = setInterval(() => {
                t--;
                document.getElementById('timer-num').innerText = t;
                if(t <= 0) { clearInterval(i); document.getElementById('timer-num').innerText = "ENJOY"; btn.disabled = false; }
            }, 1000);
        }

        function shareCert(name, num) {
            const canvas = document.getElementById('shareCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 800; canvas.height = 800;
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,800,800);
            ctx.strokeStyle = '#c5a059'; ctx.lineWidth = 15; ctx.strokeRect(30,30,740,740);
            ctx.fillStyle = '#c5a059'; ctx.textAlign = 'center';
            ctx.font = '22px Georgia'; ctx.fillText('SIGNATURE CASK AUTHENTICATED', 400, 150);
            ctx.fillStyle = 'white'; ctx.font = 'italic 50px Georgia'; ctx.fillText(name, 400, 400);
            ctx.fillStyle = '#c5a059'; ctx.font = '22px Georgia'; ctx.fillText('BOTTLE ' + num + ' OF 89 | 55.9% VOL', 400, 550);
            canvas.toBlob(blob => {
                const file = new File([blob], "cert.jpg", {type:"image/jpeg"});
                navigator.share({title: 'Signature Cask', files: [file]});
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
