<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature Cask | The Inchgower 16 Legacy</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#c5a059">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root { --gold: #c5a059; --dark: #050505; --glow: rgba(197, 160, 89, 0.7); }
        body { background-color: var(--dark); color: var(--gold); font-family: 'Georgia', serif; margin: 0; padding: 0; text-align: center; line-height: 1.6; }
        
        /* Video Hero Section */
        .hero { position: relative; height: 50vh; overflow: hidden; border-bottom: 1px solid var(--gold); }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.35); }
        .hero-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* The Gold Glowing Logo Effect */
        .logo { 
            width: 120px; 
            margin-bottom: 10px; 
            filter: drop-shadow(0 0 10px var(--glow)) drop-shadow(0 0 20px var(--glow)); 
            animation: logoGlow 3s infinite alternate; 
        }

        .container { padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        .box { border: 1px solid var(--gold); padding: 30px; background: rgba(255,255,255,0.02); margin-bottom: 30px; position: relative; }
        
        /* Tasting Grid */
        .tasting-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .note { border: 1px solid #333; padding: 10px; font-size: 0.7rem; text-transform: uppercase; color: #eee; }
        .note b { display: block; color: var(--gold); margin-bottom: 5px; }

        input { background: transparent; border: none; border-bottom: 2px solid #333; color: white; font-size: 2.5rem; width: 120px; text-align: center; margin-bottom: 25px; outline: none; transition: 0.3s; }
        input:focus { border-bottom-color: var(--gold); }
        
        button { background: var(--gold); color: black; border: none; padding: 18px 30px; font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; width: 100%; font-size: 0.8rem; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 15px; }

        /* Tasting Modal */
        #tastingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { width: 90%; max-width: 400px; border: 1px solid var(--gold); background: var(--dark); padding: 20px; position: relative; }
        
        /* Countdown Numbers */
        #timer-num { font-size: 5rem; color: white; font-weight: 300; margin: 10px 0; font-family: sans-serif; }
        
        /* Animated Verification Card */
        .bottle-card { 
            border: 2px solid var(--gold); 
            padding: 30px; 
            margin-top: 25px; 
            background: rgba(255,255,255,0.05); 
            animation: cardGlowPulse 2s infinite alternate; 
        }
        
        @keyframes logoGlow { from { filter: drop-shadow(0 0 8px var(--glow)); } to { filter: drop-shadow(0 0 15px var(--glow)); } }
        @keyframes cardGlowPulse { from { box-shadow: 0 0 5px rgba(197,160,89,0.2); } to { box-shadow: 0 0 20px rgba(197,160,89,0.4); } }
        footer { padding: 60px 20px; opacity: 0.3; font-size: 0.6rem; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="hero">
        <video class="hero-video" autoplay muted loop playsinline preload="auto">
            <source src="https://signature-cask-experience-blob-lhr1.public.blob.vercel-storage.com/1774511307741.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" class="logo" alt="Signature Cask">
            <h1 style="letter-spacing:12px; font-size:1.1rem; font-weight:300; margin:0;">SIGNATURE CASK</h1>
        </div>
    </div>

    <div class="container">
        
        <div style="margin-bottom:40px;">
            <h2 style="font-size:0.9rem; letter-spacing:5px;">CASK HERITAGE</h2>
            <div class="tasting-grid">
                <div class="note"><b>Cask</b>1st Fill Bourbon</div>
                <div class="note"><b>Distilled</b>2007</div>
                <div class="note"><b>ABV</b>55.9%</div>
            </div>
            <button class="btn-outline" onclick="openTasting()">Watch Guided Tasting</button>
        </div>

        <div class="box">
            <span style="font-size:0.6rem; letter-spacing:3px; opacity:0.6;">ENTER BOTTLE NUMBER</span><br>
            <input type="number" id="num" placeholder="0" inputmode="numeric">
            <button onclick="check()">Verify Ownership</button>
            <div id="display"></div>
        </div>

        <div class="box">
            <h3 style="letter-spacing:4px; font-size:0.8rem;">THE RITUAL OF SMOKE</h3>
            <p style="font-size:0.75rem; color:#aaa; font-style:italic;"> marriage the spirit for 30 seconds.</p>
            <div id="timer-num">30</div>
            <button id="timer-btn" class="btn-outline" onclick="startRitual()">Begin Marriage</button>
        </div>
    </div>

    <div id="tastingModal">
        <div class="modal-content">
            <h3 style="font-size:0.8rem; letter-spacing:3px;">THE SOMMELIER'S NOTES</h3>
            <video id="tastingVideo" width="100%" controls style="border: 1px solid var(--gold); margin: 20px 0;">
                <source src="PASTE_YOUR_TASTING_VIDEO_URL_HERE.mp4" type="video/mp4">
            </video>
            <button onclick="closeTasting()" class="btn-outline">Close Experience</button>
        </div>
    </div>

    <canvas id="shareCanvas" style="display:none;"></canvas>
    <footer>EST. 2024 | SCOTLAND | BUCKIE COAST</footer>

    <script>
        // Modal & Tasting Logic
        function openTasting() { document.getElementById('tastingModal').style.display = 'flex'; }
        function closeTasting() { 
            const v = document.getElementById('tastingVideo');
            v.pause();
            document.getElementById('tastingModal').style.display = 'none'; 
        }

        async function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            if(!n) return;
            d.innerHTML = "<p>VERIFYING LEDGER...</p>";
            try {
                const res = await fetch(`/api/edge?key=${n}`);
                const data = await res.json();
                if (data.result) {
                    const owner = data.result.toUpperCase();
                    d.innerHTML = `
                        <div class="bottle-card">
                            <span style="font-size:0.6rem; letter-spacing:4px;">OFFICIAL OWNER</span>
                            <h2 style="color:white; font-style:italic; font-size:2.2rem; margin:10px 0;">${owner}</h2>
                            <div style="text-align:left; border-top:1px solid #444; padding-top:15px; font-size:0.75rem;">
                                <p><b>CASK:</b> 812264B <span style="float:right;"><b>STRENGTH:</b> 55.9%</span></p>
                                <p><b>BOTTLE:</b> ${n} OF 89 <span style="float:right;"><b>AGE:</b> 16 YRS</span></p>
                            </div>
                            <button class="btn-outline" onclick="shareCert('${owner}', '${n}')">Generate Share Certificate</button>
                        </div>`;
                } else { d.innerHTML = "<p>UNREGISTERED</p>"; }
            } catch { d.innerHTML = "<p>OFFLINE</p>"; }
        }

        function startRitual() {
            let t = 30;
            const b = document.getElementById('timer-btn');
            b.disabled = true;
            const c = setInterval(() => {
                t--;
                document.getElementById('timer-num').innerText = t;
                if(t <= 0) { 
                    clearInterval(c); 
                    document.getElementById('timer-num').innerText = "POUR"; 
                    b.disabled = false;
                    b.innerText = "RESET TIMER";
                }
            }, 1000);
        }

        function shareCert(name, num) {
            const canvas = document.getElementById('shareCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000; canvas.height = 1000;
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,1000,1000);
            ctx.strokeStyle = '#c5a059'; ctx.lineWidth = 20; ctx.strokeRect(40,40,920,920);
            ctx.fillStyle = '#c5a059'; ctx.textAlign = 'center';
            ctx.font = '30px Georgia'; ctx.fillText('SIGNATURE CASK AUTHENTICATED', 500, 200);
            ctx.fillStyle = 'white'; ctx.font = 'italic 80px Georgia'; ctx.fillText(name, 500, 500);
            ctx.fillStyle = '#c5a059'; ctx.font = '35px Georgia'; 
            ctx.fillText('BOTTLE ' + num + ' OF 89 | 55.9% VOL', 500, 680);
            ctx.font = '25px Georgia'; ctx.fillText('INCHGOWER 16 YEAR OLD - CASK 812264B', 500, 750);

            canvas.toBlob(blob => {
                const file = new File([blob], "sign-auth.jpg", {type:"image/jpeg"});
                navigator.share({title: 'Signature Cask', files: [file]});
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
