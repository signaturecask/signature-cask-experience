<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Cask | Inchgower 16</title>
    <style>
        :root { --gold: #c5a059; --dark: #050505; }
        body { background: var(--dark); color: var(--gold); font-family: 'Georgia', serif; margin: 0; text-align: center; }
        
        /* Video Header */
        .hero { position: relative; height: 60vh; overflow: hidden; border-bottom: 1px solid var(--gold); }
        video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.4); }
        .hero-content { position: relative; z-index: 1; padding-top: 10vh; }
        .logo { width: 140px; margin-bottom: 10px; }

        /* Registry Search */
        .registry { padding: 50px 20px; }
        input { background: none; border: none; border-bottom: 1px solid #333; color: #fff; font-size: 2rem; width: 80px; text-align: center; outline: none; margin-bottom: 20px; }
        button { background: var(--gold); color: #000; border: none; padding: 12px 30px; font-weight: bold; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }

        /* Result Display */
        #display { margin-top: 30px; min-height: 150px; }
        .bottle-card { border: 1px solid var(--gold); padding: 30px; max-width: 400px; margin: 0 auto; background: rgba(255,255,255,0.02); }
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left; font-size: 0.8rem; border-top: 1px solid #333; padding-top: 20px; }
        .spec-item b { color: #fff; display: block; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }

        /* Ritual Section */
        .ritual { padding: 60px 20px; max-width: 700px; margin: 0 auto; line-height: 1.8; color: #bbb; }
        h3 { letter-spacing: 4px; text-transform: uppercase; color: var(--gold); }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline>
            <source src="https://signature-cask-experience-blob-lhr1.public.blob.vercel-storage.com/1774511307741.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" alt="Logo" class="logo">
            <h1 style="letter-spacing:8px; font-weight:300;">SIGNATURE CASK</h1>
        </div>
    </div>

    <div class="registry">
        <input type="number" id="num" placeholder="0">
        <br>
        <button onclick="check()">Verify Authenticity</button>
        <div id="display"></div>
    </div>

    <div class="ritual">
        <h3>The Ritual of Smoke</h3>
        <p>Ignite the artisanal chips to release a dense aromatic cloud. As the smoke descends into the 58.9% Vol spirit, the coastal salt of the Inchgower 16 meets the primal scent of charred oak.</p>
    </div>

    <script>
        async function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            if(!n) return;
            d.innerHTML = "CONSULTING LEDGER...";
            
            try {
                const res = await fetch(`/api/edge?key=${n}`);
                const data = await res.json();
                
                if (data.result) {
                    d.innerHTML = `
                        <div class="bottle-card">
                            <small style="letter-spacing:2px;">AUTHENTICATED OWNER</small>
                            <h2 style="color:#fff; font-style:italic; margin: 10px 0;">${data.result.toUpperCase()}</h2>
                            
                            <div class="spec-grid">
                                <div class="spec-item"><b>Distillery</b>Inchgower</div>
                                <div class="spec-item"><b>Age</b>16 Years</div>
                                <div class="spec-item"><b>Cask No.</b>812264B</div>
                                <div class="spec-item"><b>Strength</b>58.9% Vol</div>
                                <div class="spec-item"><b>Bottle</b>${n} of 89</div>
                                <div class="spec-item"><b>Finish</b>1st Fill Bourbon</div>
                            </div>
                        </div>`;
                } else {
                    d.innerHTML = "Entry Not Found";
                }
            } catch { d.innerHTML = "System Offline"; }
        }
    </script>
</body>
</html>
