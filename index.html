<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Cask Experience</title>
    <style>
        body { background: #0a0a0a; color: #c5a059; font-family: serif; text-align: center; padding: 40px 20px; }
        .registry-box { border: 1px solid #c5a059; padding: 40px 20px; max-width: 400px; margin: 50px auto; background: #111; }
        input { background: none; border: none; border-bottom: 1px solid #c5a059; color: #fff; font-size: 1.5rem; width: 80%; text-align: center; margin-bottom: 30px; outline: none; }
        button { background: #c5a059; color: #000; border: none; padding: 15px 40px; letter-spacing: 2px; font-weight: bold; cursor: pointer; }
        #display { margin-top: 30px; min-height: 80px; }
    </style>
</head>
<body>
    <div class="registry-box">
        <h2 style="letter-spacing: 3px;">GLOBAL REGISTRY</h2>
        <input type="number" id="num" placeholder="0">
        <br>
        <button onclick="check()">VERIFY ENTRY</button>
        <div id="display"></div>
    </div>
    <script>
        async function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            if(!n) return;
            d.innerText = "VERIFYING...";
            try {
                const res = await fetch(`/api/edge?key=${n}`);
                const data = await res.json();
                if(data.result) {
                    d.innerHTML = `<small>AUTHENTICATED OWNER</small><br><span style="font-size:1.8rem; color:#fff; font-style:italic;">${data.result.toUpperCase()}</span>`;
                } else {
                    d.innerHTML = "Entry Not Found";
                }
            } catch { d.innerHTML = "OFFLINE"; }
        }
    </script>
</body>
</html>
