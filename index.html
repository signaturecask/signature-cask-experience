<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature Cask | Zenith Experience</title>
    
    <style>
        :root { --gold: #c5a059; --dark: #050505; --glow: rgba(197, 160, 89, 0.4); }
        body { background-color: var(--dark); color: var(--gold); font-family: 'Georgia', serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        /* Calibration Overlay */
        #calibration { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #calibration img { width: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 15px var(--glow)); }
        
        .hero { position: relative; height: 45vh; overflow: hidden; border-bottom: 1px solid var(--gold); }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.25); }
        .hero-content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { width: 140px; filter: drop-shadow(0 0 15px var(--glow)); animation: softPulse 4s infinite alternate; }

        .container { padding: 30px 20px; max-width: 500px; margin: 0 auto; }
        .box { border: 1px solid var(--gold); padding: 25px; background: rgba(255,255,255,0.02); margin-bottom: 25px; position: relative; }
        
        button { background: var(--gold); color: black; border: none; padding: 18px 30px; font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; width: 100%; font-size: 0.8rem; border-radius: 0; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 15px; }
        input { background: transparent; border: none; border-bottom: 2px solid #333; color: white; font-size: 2.5rem; width: 120px; text-align: center; margin-bottom: 20px; outline: none; }
        
        @keyframes softPulse { from { filter: drop-shadow(0 0 10px var(--glow)); } to { filter: drop-shadow(0 0 25px var(--glow)); } }
        footer { padding: 40px 20px; opacity: 0.3; font-size: 0.6rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="calibration">
        <img src="logo.png" alt="Signature Cask">
        <p style="letter-spacing: 2px; font-size: 0.65rem; color: var(--gold); margin-bottom: 10px;">1. FLIP SILENT SWITCH OFF (SIDE OF PHONE)</p>
        <p style="letter-spacing: 2px; font-size: 0.65rem; color: var(--gold); margin-bottom: 30px;">2. TURN MEDIA VOLUME TO MAX</p>
        <button onclick="startExperience()">ENTER THE EXPERIENCE</button>
    </div>

    <audio id="audioWaves" loop playsinline crossorigin="anonymous">
        <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="audioFire" loop playsinline crossorigin="anonymous">
        <source src="https://assets.mixkit.co/active_storage/sfx/2436/2436-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="hero">
        <video class="hero-video" autoplay muted loop playsinline preload="auto">
            <source src="https://signature-cask-experience-blob-lhr1.public.blob.vercel-storage.com/1774511307741.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" class="logo" alt="Signature Cask">
            <h1 style="letter-spacing:10px; font-size:1.1rem; font-weight:300; margin:0;">SIGNATURE CASK</h1>
            <p style="font-size:0.8rem; letter-spacing:3px; font-style:italic; margin-top: 5px;">The Inchgower 16 Legacy</p>
        </div>
    </div>

    <div class="container">
        <div class="box">
            <h2 style="font-size: 0.8rem; letter-spacing: 4px;">THE PROVENANCE</h2>
            <p style="font-size: 0.75rem; color: #bbb; font-style: italic;">Distilled 15/12/09. Drawn 21/01/26. Matured for 16 years in a 1st Fill Bourbon Barrel (812264B) at 55.9% Vol.</p>
            <button class="btn-outline" onclick="openModal()">Guided Tasting</button>
        </div>

        <div class="box">
            <span style="font-size:0.6rem; letter-spacing:3px; opacity:0.6;">AUTHENTICATE BOTTLE</span><br>
            <input type="number" id="num" placeholder="0" inputmode="numeric">
            <button onclick="check()">Verify Ownership</button>
            <div id="display"></div>
        </div>

        <div class="box">
            <h3 style="letter-spacing:4px; font-size:0.8rem;">THE RITUAL TIMER</h3>
            <div id="timer-num" style="font-size: 3.5rem; color: white;">30</div>
            <button id="timer-btn" class="btn-outline" onclick="startRitual()">Begin Marriage</button>
        </div>
    </div>

    <script>
        const waves = document.getElementById('audioWaves');
        const fire = document.getElementById('audioFire');

        function startExperience() {
            // Hide overlay
            document.getElementById('calibration').style.display = 'none';
            
            // Set volumes
            waves.volume = 0.5;
            fire.volume = 0.4;
            
            // Start playback
            waves.play().catch(e => console.log("Waves blocked"));
            fire.play().catch(e => console.log("Fire blocked"));
        }

        function check() {
            const n = document.getElementById('num').value;
            const d = document.getElementById('display');
            if(!n) return;
            d.innerHTML = "<p style='font-size:0.7rem;'>VERIFYING...</p>";
            fetch(`/api/edge?key=${n}`).then(res => res.json()).then(data => {
                if (data.result) {
                    d.innerHTML = `<div style="margin-top:20px; border-top:1px solid var(--gold); padding-top:20px;">
                        <span style="font-size:0.5rem; letter-spacing:3px;">OWNER</span>
                        <h2 style="color:white; font-style:italic;">${data.result.toUpperCase()}</h2>
                        <button class="btn-outline" style="background:white; color:black;">JOIN THE 89 CLUB</button>
                    </div>`;
                }
            });
        }

        function startRitual() {
            let t = 30; const b = document.getElementById('timer-btn'); b.disabled = true;
            const c = setInterval(() => { t--; document.getElementById('timer-num').innerText = t; if(t <= 0) { clearInterval(c); document.getElementById('timer-num').innerText = "POUR"; b.disabled = false; } }, 1000);
        }
    </script>
</body>
</html>
