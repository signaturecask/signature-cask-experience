<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature Cask | The 89 Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;600&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark: #050505; --soft-gold: rgba(197, 160, 89, 0.2); }
        
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--dark); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- LUXURY ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes goldShimmer { 0% { background-position: -200% ; } 100% { background-position: 200%; } }

        /* --- HEADER & LOGO --- */
        header { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .logo-container { animation: pulse 4s infinite ease-in-out; text-align: center; }
        .logo { width: 160px; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.3)); margin-bottom: 20px; }
        .scroll-hint { position: absolute; bottom: 30px; font-size: 0.5rem; letter-spacing: 5px; opacity: 0.4; text-transform: uppercase; }

        /* --- LUXURY SECTIONS --- */
        .section { padding: 80px 25px; max-width: 500px; margin: 0 auto; opacity: 0; transform: translateY(30px); transition: 1.5s all ease; }
        .section.visible { opacity: 1; transform: translateY(0); }

        .glass-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--soft-gold); 
            padding: 40px 20px; 
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .label { font-size: 0.5rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 30px; display: block; font-weight: 600; }

        /* --- THE DIGITAL LEDGER --- */
        .ledger-input-wrap { margin-bottom: 30px; }
        input { 
            background: transparent; border: none; border-bottom: 1px solid var(--soft-gold); 
            color: #fff; font-size: 4rem; width: 100%; text-align: center; 
            outline: none; font-family: 'Playfair Display', serif; transition: 0.5s;
        }
        input:focus { border-bottom: 1px solid var(--gold); }

        .verify-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 20px; width: 100%; letter-spacing: 4px; text-transform: uppercase; 
            font-size: 0.6rem; cursor: pointer; transition: 0.5s; 
        }
        .verify-btn:hover { background: var(--gold); color: #000; }

        .result-reveal { margin-top: 40px; display: none; text-align: center; }
        .wax-seal { 
            width: 60px; height: 60px; background: #600; border-radius: 50%; 
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #400; box-shadow: inset 0 0 15px #000; color: var(--gold);
            font-weight: bold; font-family: 'Playfair Display', serif;
        }
        .custodian-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; color: #fff; margin: 10px 0; display: block; }

        /* --- THE RITUAL TIMER --- */
        #timer-num { font-size: 6rem; font-weight: 100; color: var(--gold); margin: 20px 0; font-family: 'Montserrat', sans-serif; }
        
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Signature Cask" class="logo">
            <h1 style="font-weight: 100; letter-spacing: 8px; font-size: 0.7rem; opacity: 0.8;">THE INCHGOWER 16 LEGACY</h1>
        </div>
        <div class="scroll-hint">Scroll to Authenticate</div>
    </header>

    <div class="container">

        <section class="section" id="ledger-section">
            <div class="glass-card">
                <span class="label">Digital Ledger</span>
                <div class="ledger-input-wrap">
                    <input type="number" id="bNumber" placeholder="00" inputmode="numeric">
                </div>
                <button class="verify-btn" onclick="consultArchives()">Consult Archives</button>

                <div id="revealArea" class="result-reveal">
                    <div class="wax-seal">SC</div>
                    <span style="font-size: 0.5rem; letter-spacing: 3px; color: var(--gold);">VERIFIED CUSTODIAN</span>
                    <span id="cName" class="custodian-name"></span>
                    <span id="bID" style="letter-spacing: 6px; font-size: 0.6rem; opacity: 0.6;"></span>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="glass-card">
                <span class="label">The Infusion Ritual</span>
                <p style="font-size: 0.6rem; letter-spacing: 2px; line-height: 2; opacity: 0.7;">
                    IGNITE THE STAVE CHIPS. INVERT THE GLASS.<br>REUNITE THE SPIRIT WITH THE WOOD.
                </p>
                <div id="timer-num">30</div>
                <button class="verify-btn" onclick="startRitual()">Initiate Smoke</button>
            </div>
        </section>

        <section class="section" style="text-align: center; padding-bottom: 100px;">
            <p style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 0;">Lee Messenger</p>
            <p style="font-size: 0.4rem; letter-spacing: 5px; opacity: 0.5;">FOUNDER • SIGNATURE CASK</p>
        </section>

    </div>

    <script>
        // --- DATASET: BOTTLES 1-89 ---
        // I have set "Lee Messenger" for #1 and #89. 
        // All others will show "Awaiting Allocation" unless you add them here.
        const custodians = {
            "1": "Lee Messenger",
            "89": "Lee Messenger"
        };

        // Scroll Observer for luxury fade-in effect
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.section').forEach(section => observer.observe(section));

        function consultArchives() {
            const num = document.getElementById('bNumber').value;
            const reveal = document.getElementById('revealArea');
            const nameField = document.getElementById('cName');
            const idField = document.getElementById('bID');

            if(!num || num < 1 || num > 89) {
                alert("Please enter a valid bottle number (1-89)");
                return;
            }

            // High-end reveal logic
            nameField.innerText = custodians[num] ? custodians[num].toUpperCase() : "AWAITING ALLOCATION";
            idField.innerText = "BOTTLE " + num + " OF 89";
            
            reveal.style.display = 'block';
            window.scrollTo({ top: document.getElementById('ledger-section').offsetTop + 100, behavior: 'smooth' });
        }

        function startRitual() {
            let time = 30;
            const display = document.getElementById('timer-num');
            const btn = event.target;
            btn.disabled = true;
            btn.innerText = "INFUSING SPIRIT...";

            const countdown = setInterval(() => {
                time--;
                display.innerText = time;
                if(time <= 0) {
                    clearInterval(countdown);
                    display.innerText = "REUNITE";
                    btn.innerText = "RITUAL COMPLETE";
                }
            }, 1000);
        }
    </script>
</body>
</html>
