<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Cask | Registry Admin</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; }
        body { background: var(--dark); color: var(--gold); font-family: 'Georgia', serif; text-align: center; padding: 40px 20px; margin: 0; }
        .admin-card { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 30px; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        input { display: block; width: 100%; padding: 12px; margin-bottom: 20px; background: #111; border: 1px solid #444; color: white; text-align: center; font-size: 1rem; border-radius: 4px; }
        input:focus { border-color: var(--gold); outline: none; }
        button { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e0b86d; }
        #status { margin-top: 20px; font-size: 0.8rem; letter-spacing: 1px; min-height: 1.2rem; }
        .success { color: #4CAF50; }
        .error { color: #FF5252; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>Registry Control</h1>
        
        <input type="number" id="bottleNumber" placeholder="BOTTLE NUMBER (e.g. 1)">
        <input type="text" id="ownerName" placeholder="OWNER NAME">
        
        <button onclick="updateRegistry()">Update Global Ledger</button>
        
        <div id="status"></div>
    </div>

    <script>
        async function updateRegistry() {
            const key = document.getElementById('bottleNumber').value;
            const value = document.getElementById('ownerName').value;
            const statusDiv = document.getElementById('status');
            
            if (!key || !value) {
                statusDiv.innerHTML = '<span class="error">PLEASE FILL BOTH FIELDS</span>';
                return;
            }

            statusDiv.innerText = "Connecting to Ledger...";

            try {
                // This talks to your Vercel Edge Function
                const response = await fetch(`/api/edge?key=${key}&value=${encodeURIComponent(value)}`);
                const data = await response.json();

                if (data.success) {
                    statusDiv.innerHTML = `<span class="success">✓ BOTTLE ${key} REGISTERED TO ${value.toUpperCase()}</span>`;
                    // Clear inputs for the next one
                    document.getElementById('bottleNumber').value = '';
                    document.getElementById('ownerName').value = '';
                } else {
                    statusDiv.innerHTML = '<span class="error">DATABASE ERROR: Check Vercel Settings</span>';
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = '<span class="error">CONNECTION FAILED: Check Internet or Vercel Keys</span>';
            }
        }
    </script>
</body>
</html>
