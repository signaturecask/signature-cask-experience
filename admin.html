<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Signature Cask</title>
    <style>
        body { background: #0a0a0a; color: #c5a059; font-family: serif; text-align: center; padding: 50px 20px; }
        .box { border: 1px solid #c5a059; padding: 30px; max-width: 350px; margin: 0 auto; background: #111; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #c5a059; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #msg { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>REGISTRY CONTROL</h3>
        <input type="number" id="id" placeholder="BOTTLE NUMBER">
        <input type="text" id="owner" placeholder="OWNER NAME">
        <button onclick="save()">UPDATE GLOBAL LEDGER</button>
        <div id="msg"></div>
    </div>
    <script>
        async function save() {
            const k = document.getElementById('id').value;
            const v = document.getElementById('owner').value;
            const m = document.getElementById('msg');
            m.innerText = "Connecting...";
            try {
                const res = await fetch(`/api/edge?key=${k}&value=${encodeURIComponent(v)}`);
                const data = await res.json();
                if(data.success) { m.innerHTML = "<span style='color:lime'>✓ SUCCESS: SAVED</span>"; }
                else { m.innerHTML = "<span style='color:red'>DATABASE ERROR</span>"; }
            } catch { m.innerHTML = "<span style='color:red'>CONNECTION FAILED</span>"; }
        }
    </script>
</body>
</html>
