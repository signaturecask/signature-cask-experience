<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<title>Admin | Signature Cask</title>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-[#D4AF37] text-2xl italic mb-8">Registry Admin</h1>
        <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800">
            <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Bottle Number</label>
            <input type="number" id="bn" class="w-full bg-transparent border-b border-zinc-700 text-3xl mb-6 outline-none text-[#D4AF37]">
            <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Assign Owner</label>
            <input type="text" id="ow" placeholder="e.g. Old Course Hotel" class="w-full bg-transparent border-b border-zinc-700 mb-8 outline-none pb-2">
            <button onclick="alert('Synced to Ledger')" class="w-full py-4 bg-[#D4AF37] text-black font-bold uppercase text-xs tracking-widest">Commit to Ledger</button>
        </div>
    </div>
</body>
</html>
